<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">    
  <title>Frontend Mentor | Typing Speed Test</title>  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="test-container">
    
    <div class="top-meta">
      <span class="keyboard-icon">⌨️</span>
      <span class="best-score">🏆 Best: 92 WPM</span>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-label">WPM:</span>
        <span class="stat-value" id="wpm-val">0</span>
      </div>
      
      <div class="stat-divider"></div>
      
      <div class="stat-item">
        <span class="stat-label">Accuracy:</span>
        <span class="stat-value" id="accuracy-val">100%</span>
      </div>
      
      <div class="stat-divider"></div>
      
      <div class="stat-item">
        <span class="stat-label">Time:</span>
        <span class="stat-value" id="timer-val">60</span>
      </div>
    </div>

    <div class="difficulty-selectors">
      <select class="diff-dropdown" id="difficulty-select">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard" selected>Hard</option>
      </select>
      
      <select class="diff-dropdown" id="time-select">
        <option value="60">Timed (60s)</option>
        <option value="30">Timed (30s)</option>
      </select>
    </div>

    <hr class="section-divider">

    <div class="passage-wrapper locked">
      <div id="passage-container" class="passage-box"></div>
      
      <div class="start-overlay">
        <button id="start-btn" class="btn-start">Start Typing Test</button>
        <p class="overlay-subtext">Or click the text and start typing</p>
      </div>
    </div>

    <textarea id="typing-input" placeholder="Start typing here..."></textarea>

  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. <br>
    Coded by <a href="https://ghod-zilla12.github.io/Typing-speed-test/">Ghod-Zilla12.</a>
  </footer>    

  <script src="main.js"></script>
</body>
</html>
